name: Patch Stack Sync

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 2am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — preview only, no pushes or PR mutations'
        type: boolean
        default: false

jobs:
  sync:
    uses: DJRHails/patch-stack-action/.github/workflows/patch-stack-sync.yml@main
    with:
      upstream_repo: vercel-labs/agent-browser   # ← change per repo
      upstream_branch: main
      fork_repo: djrhails/agent-browser           # ← change per repo
      fork_main: main
      dry_run: ${{ inputs.dry_run || false }}
    secrets:
      app_id: ${{ secrets.PATCH_STACK_APP_ID }}
      app_private_key: ${{ secrets.PATCH_STACK_APP_PRIVATE_KEY }}
      # Generate this token locally with: claude setup-token
      # Then add as a repo secret named CLAUDE_CODE_OAUTH_TOKEN
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
