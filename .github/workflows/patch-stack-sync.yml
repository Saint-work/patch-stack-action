name: Patch Stack Sync

# Reusable workflow — call this from any fork repo.
# See README.md for full setup instructions.
on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repo (owner/repo)'
        required: true
        type: string
      upstream_branch:
        description: 'Upstream branch to track'
        required: false
        default: 'main'
      fork_repo:
        description: 'Fork repo (owner/repo)'
        required: true
        type: string
      fork_main:
        description: 'Fork branch to rebuild'
        required: false
        default: 'main'
      fork_upstream_branch:
        description: 'Fork branch that mirrors upstream for patch PR bases'
        required: false
        default: 'upstream'
      upstream_tag_pattern:
        description: 'Pin upstream to latest tag matching this glob (e.g. v*). Excludes pre-release tags containing a hyphen suffix. Leave empty to track branch HEAD.'
        required: false
        type: string
        default: ''
      upstream_commit_override:
        description: 'Skip ahead to this commit SHA instead of the latest tag. Automatically ignored once a tag containing this commit is released.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — no pushes or PR mutations'
        type: boolean
        default: false

  workflow_call:
    inputs:
      upstream_repo:
        description: 'Upstream repo in owner/repo format (e.g. vercel-labs/agent-browser)'
        required: true
        type: string
      upstream_branch:
        description: 'Upstream branch to track'
        required: false
        type: string
        default: 'main'
      fork_repo:
        description: 'Fork repo in owner/repo format (e.g. djrhails/agent-browser)'
        required: true
        type: string
      fork_main:
        description: 'Fork branch to keep rebuilt as upstream + patches'
        required: false
        type: string
        default: 'main'
      fork_upstream_branch:
        description: 'Fork branch that mirrors upstream for patch PR bases'
        required: false
        type: string
        default: 'upstream'
      upstream_tag_pattern:
        description: 'Pin upstream to latest tag matching this glob (e.g. v*). Excludes pre-release tags containing a hyphen suffix. Leave empty to track branch HEAD.'
        required: false
        type: string
        default: ''
      upstream_commit_override:
        description: 'Skip ahead to this commit SHA instead of the latest tag. Automatically ignored once a tag containing this commit is released.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'If true, skip all pushes and PR mutations'
        required: false
        type: boolean
        default: false
    secrets:
      app_id:
        description: 'GitHub App ID (for generating a token with cross-repo PR write access)'
        required: true
      app_private_key:
        description: 'GitHub App private key'
        required: true
      claude_code_oauth_token:
        description: 'Claude Code OAuth token (Pro/Max subscription). Generate with: claude setup-token'
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # ── Auth ──────────────────────────────────────────────────────────────
      # Use a GitHub App token for fork access rather than GITHUB_TOKEN or OIDC so that:
      # 1. Pushes made here can trigger other workflows (GITHUB_TOKEN can't)
      # 2. We can fetch/push the fork even when it is private
      # 3. Cron jobs work — OIDC token exchange fails on scheduled runs
      #    (see https://github.com/anthropics/claude-code-action/issues/814)
      - name: Parse repository coordinates
        id: repos
        shell: bash
        env:
          FORK_REPO: ${{ inputs.fork_repo }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          {
            echo "fork_owner=${FORK_REPO%%/*}"
            echo "fork_name=${FORK_REPO#*/}"
            echo "upstream_owner=${UPSTREAM_REPO%%/*}"
            echo "upstream_name=${UPSTREAM_REPO#*/}"
            # Extract git ref from workflow_ref
            # e.g. "owner/repo/.github/workflows/file.yml@refs/heads/main" → "refs/heads/main"
            echo "action_ref=${WORKFLOW_REF##*@}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate fork GitHub App token
        id: fork-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ steps.repos.outputs.fork_owner }}
          repositories: ${{ steps.repos.outputs.fork_name }}

      - name: Generate upstream GitHub App token
        id: upstream-token
        continue-on-error: true
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ steps.repos.outputs.upstream_owner }}
          repositories: ${{ steps.repos.outputs.upstream_name }}

      # ── Checkout ──────────────────────────────────────────────────────────
      # Full history needed for rebase and cherry-pick operations.
      # persist-credentials: false prevents the token from being stored in
      # .git/config — we configure authenticated remotes explicitly below.
      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          repository: ${{ inputs.fork_repo }}
          token: ${{ steps.fork-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout patch-stack-action scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          repository: DJRHails/patch-stack-action
          ref: ${{ steps.repos.outputs.action_ref }}
          path: .patch-stack-action
          sparse-checkout: scripts/workflow
          persist-credentials: false

      - name: Configure git identity and origin auth
        shell: bash
        env:
          GH_TOKEN: ${{ steps.fork-token.outputs.token }}
          FORK_REPO: ${{ inputs.fork_repo }}
        run: |
          set -euo pipefail
          git config user.name  "patch-stack-bot[bot]"
          git config user.email "patch-stack-bot[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${FORK_REPO}.git"

      # ── Fetch upstream ────────────────────────────────────────────────────
      - name: Add upstream remote and fetch all patch branches
        shell: bash
        env:
          UPSTREAM_GH_TOKEN: ${{ steps.upstream-token.outputs.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          UPSTREAM_TAG_PATTERN: ${{ inputs.upstream_tag_pattern }}
        run: |
          set -euo pipefail

          if [[ -n "${UPSTREAM_GH_TOKEN}" ]]; then
            upstream_url="https://x-access-token:${UPSTREAM_GH_TOKEN}@github.com/${UPSTREAM_REPO}.git"
          else
            upstream_url="https://github.com/${UPSTREAM_REPO}.git"
            echo "::notice::No upstream app installation detected; using anonymous fetch for ${UPSTREAM_REPO}"
          fi

          git remote add upstream "${upstream_url}" 2>/dev/null \
            || git remote set-url upstream "${upstream_url}"

          git fetch upstream "$UPSTREAM_BRANCH" --quiet
          # Fetch tags only when tag pinning is configured
          if [[ -n "${UPSTREAM_TAG_PATTERN}" ]]; then
            git fetch upstream --tags --quiet
          fi
          # Fetch all patch/* branches from origin into local tracking branches
          git fetch origin '+refs/heads/patch/*:refs/heads/patch/*' --quiet 2>/dev/null || true

      - name: Update fork upstream mirror branch
        id: sync-upstream
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          UPSTREAM_TAG_PATTERN: ${{ inputs.upstream_tag_pattern }}
          UPSTREAM_COMMIT_OVERRIDE: ${{ inputs.upstream_commit_override }}
          FORK_UPSTREAM_BRANCH: ${{ inputs.fork_upstream_branch }}
        run: bash .patch-stack-action/scripts/workflow/sync-upstream-branch.sh

      # ── Discover patches ──────────────────────────────────────────────────
      - name: Discover patch branches and check upstream status
        id: discover
        shell: bash
        env:
          UPSTREAM_GH_TOKEN: ${{ steps.upstream-token.outputs.token }}
          FORK_GH_TOKEN: ${{ steps.fork-token.outputs.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          FORK_REPO: ${{ inputs.fork_repo }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          FORK_UPSTREAM_BRANCH: ${{ inputs.fork_upstream_branch }}
          FORK_OWNER: ${{ steps.repos.outputs.fork_owner }}
        run: bash .patch-stack-action/scripts/workflow/discover.sh

      # ── Handle merged patches ─────────────────────────────────────────────
      - name: Delete merged patch branches
        if: steps.discover.outputs.merged_patches != ''
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          GH_TOKEN: ${{ steps.fork-token.outputs.token }}
          FORK_REPO: ${{ inputs.fork_repo }}
          MERGED_PATCHES: ${{ steps.discover.outputs.merged_patches }}
        run: bash .patch-stack-action/scripts/workflow/cleanup-merged.sh

      - name: Refresh patch metadata after cleanup
        if: steps.discover.outputs.merged_patches != ''
        shell: bash
        env:
          UPSTREAM_GH_TOKEN: ${{ steps.upstream-token.outputs.token }}
          FORK_GH_TOKEN: ${{ steps.fork-token.outputs.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          FORK_REPO: ${{ inputs.fork_repo }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          FORK_UPSTREAM_BRANCH: ${{ inputs.fork_upstream_branch }}
          FORK_OWNER: ${{ steps.repos.outputs.fork_owner }}
        run: bash .patch-stack-action/scripts/workflow/discover.sh


      # ── Rebase each patch branch ──────────────────────────────────────────
      - name: Rebase patch branches onto their parents
        id: rebase
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          FORK_MAIN: ${{ inputs.fork_main }}
          FORK_UPSTREAM_BRANCH: ${{ inputs.fork_upstream_branch }}
        run: bash .patch-stack-action/scripts/workflow/rebase.sh

      # ── Claude Code conflict resolution ───────────────────────────────────
      # Only runs when rebase produced conflicts.
      # Pass the App token as github_token so OIDC exchange is bypassed entirely
      # — this is the fix for cron-triggered runs failing auth.
      - name: Resolve conflicts and rebuild with Claude Code
        if: steps.rebase.outputs.needs_claude == 'true' && inputs.dry_run == false
        uses: anthropics/claude-code-action@1fc90f3ed982521116d8ff6d85b948c9b12cae3e  # v1.0.69
        env:
          UPSTREAM_GH_TOKEN: ${{ steps.upstream-token.outputs.token }}
        with:
          github_token: ${{ steps.fork-token.outputs.token }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          claude_args: --max-turns 120
          show_full_output: true
          # Allow Claude to run git/gh commands, read/write files for conflict
          # resolution and fork/main rebuild.
          settings: '{"permissions":{"allow":["Bash(git *)","Bash(gh *)","Bash(cat *)","Bash(sed *)","Bash(grep *)","Bash(wc *)","Bash(echo *)","Bash(env *)","Bash(printf *)","Bash(curl *)","Bash(python3 *)","Read","Write","Edit"]}}'
          prompt: |
            You are maintaining a patch stack fork of ${{ inputs.upstream_repo }}.

            This fork's `${{ inputs.fork_main }}` branch is always kept as:
              `${{ inputs.fork_upstream_branch }}` + all active patch branches applied in order

            The `${{ inputs.fork_upstream_branch }}` branch is a fork-local mirror of
            `upstream/${{ inputs.upstream_branch }}`. Root patches rebase onto that
            branch so GitHub can display fork-local PRs cleanly.

            Each patch branch is named `patch/<n>` or `patch/<parent>--<child>` where
            `--` encodes a dependency (child rebases onto parent, not directly onto
            `${{ inputs.fork_upstream_branch }}`).

            The previous steps already:
            - Fetched upstream/${{ inputs.upstream_branch }}
            - Updated `${{ inputs.fork_upstream_branch }}` to match upstream/${{ inputs.upstream_branch }}
            - Attempted to rebase each patch branch onto its parent
            - Pushed branches that rebased cleanly
            - Identified branches with conflicts, written to /tmp/conflicts.json
            - Exported UPSTREAM_GH_TOKEN when the app is installed on the upstream repo
            - Collected any non-patch-stack commits already on ${{ inputs.fork_main }}
              into /tmp/preserved_main_commits.txt so they can be replayed before patches

            /tmp/conflicts.json contains an array of objects:
            {
              "branch":            "patch/foo--bar",
              "parent":            "patch/foo",
              "conflicting_files": ["src/index.ts"],
              "pr_url":            "https://github.com/.../pull/42",
              "pr_title":          "Add bar feature",
              "pr_body":           "..."  // full PR description
            }

            PR metadata prefers the real upstream PR. If no upstream PR exists,
            the workflow falls back to the fork-local visibility PR metadata.

            /tmp/sorted_branches.txt contains ALL active patch branches in topological
            order (one per line) — use this for rebuilding ${{ inputs.fork_main }}.

            PR metadata for each branch `<branch>` is available in temp files:
              /tmp/meta_title_<safe>  — PR title
              /tmp/meta_num_<safe>    — PR number
              /tmp/meta_url_<safe>    — PR URL
              /tmp/meta_body_<safe>   — PR body
            where `<safe>` = branch name with `/` replaced by `_`.
            Example: branch `patch/fix-config` → `/tmp/meta_title_patch_fix-config`

            **Always read these files for PR info.** Do not call gh/curl to look up
            PR numbers — the metadata files are authoritative and the default
            GH_TOKEN may not have access to the upstream repo.

            To run `gh` commands against the upstream repo, prefix with
            `env GH_TOKEN="$UPSTREAM_GH_TOKEN"`. The default GH_TOKEN only
            works for the fork repo.

            /tmp/preserved_main_commits.txt contains zero or more commit SHAs from the
            old ${{ inputs.fork_main }} that are local-only and must be preserved.
            Replay them in order with `git cherry-pick <sha>` after resetting
            ${{ inputs.fork_main }} to `${{ inputs.fork_upstream_branch }}` and before
            squash-merging the patch branches.

            ## Safety rules

            - **Never push to ${{ inputs.fork_main }} unless EVERY patch resolved cleanly.**
              If any patch cannot be confidently resolved, ABORT: write the summary and exit 1.
            - A patch is only "superseded" if upstream has FULLY accomplished the goal
              described in the PR body. Partial overlap is NOT superseded — resolve the
              conflict to preserve the patch's remaining intent.
            - When in doubt, ABORT. A failed workflow is always better than a wrong merge.

            ## Your task

            For each entry in /tmp/conflicts.json:

            1. Read the PR title and body carefully to understand INTENT of the patch.
            2. Check what changed in upstream that caused the conflict:
               `git log --oneline ${{ inputs.fork_upstream_branch }} -20`
               `git diff <parent> ${{ inputs.fork_upstream_branch }} -- <conflicting_files>`
            3. DECISION — pick exactly one:

               **SUPERSEDED** — upstream has fully accomplished the PR's goal:
                 a. Identify the upstream commit(s) that accomplished the goal.
                 b. If `UPSTREAM_GH_TOKEN` is set, run:
                    `env GH_TOKEN="$UPSTREAM_GH_TOKEN" gh pr comment <number> --repo ${{ inputs.upstream_repo }} --body "..."`
                    Include the upstream commit SHA(s) that supersede this PR.
                    If `UPSTREAM_GH_TOKEN` is unset or the command fails, log a warning and continue.
                 c. If `UPSTREAM_GH_TOKEN` is set, run:
                    `env GH_TOKEN="$UPSTREAM_GH_TOKEN" gh pr close <number> --repo ${{ inputs.upstream_repo }}`
                    If `UPSTREAM_GH_TOKEN` is unset or the command fails, log a warning and continue.
                 d. `git push origin <branch>:refs/heads/archived/<suffix>`
                 e. `git push origin --delete <branch>`
                 f. Remove the branch from /tmp/sorted_branches.txt

               **RESOLVE** — genuine conflict, both changes should coexist:
                 a. `git checkout <branch>`
                 b. `git rebase <parent>` — conflict markers will appear
                 c. Resolve each file: preserve upstream's approach, adapt patch on top.
                    Use the PR description as the source of truth for intent.
                 d. `git add <resolved files>`
                 e. `git rebase --continue`  (repeat c–e if multi-commit rebase)
                 f. `git push --force-with-lease origin <branch>`

               **ABORT** — you are not confident in either decision:
                 a. Write the summary (step 5) explaining what you found
                 b. `exit 1` — do NOT rebuild or push ${{ inputs.fork_main }}

            After handling all conflicts (only if none aborted):

            4. Rebuild ${{ inputs.fork_main }}:
               a. `git checkout ${{ inputs.fork_main }}`
               b. `git reset --hard ${{ inputs.fork_upstream_branch }}`
               c. Replay each SHA in /tmp/preserved_main_commits.txt in order with
                  `git cherry-pick <sha>` if the file is non-empty
               d. For each branch in /tmp/sorted_branches.txt (skip archived ones):
                  - `git merge --squash <branch>`
                  - If clean: `git commit -m "patch-stack: <pr_title> (#<pr_num>)\n\nPatch-Stack-Branch: <branch>\n<Upstream PR|Local PR>: <pr_url>"`
                  - If conflict: resolve files, `git add`, then commit with same message format
               e. `git push --force origin ${{ inputs.fork_main }}`

            5. Write a markdown summary to /tmp/claude_summary.md:
               - Branches resolved cleanly (list)
               - Branches closed as superseded (list + reason)
               - Branches that caused an abort (list + what was unclear)
               - Any remaining issues

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: bash
        env:
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          UPSTREAM_TAG: ${{ steps.sync-upstream.outputs.upstream_tag }}
          UPSTREAM_SHA: ${{ steps.sync-upstream.outputs.upstream_sha }}
          FORK_REPO: ${{ inputs.fork_repo }}
          FORK_MAIN: ${{ inputs.fork_main }}
          FORK_UPSTREAM_BRANCH: ${{ inputs.fork_upstream_branch }}
          DRY_RUN: ${{ inputs.dry_run }}
          MERGED_PATCHES: ${{ steps.discover.outputs.merged_patches }}
          NEEDS_CLAUDE: ${{ steps.rebase.outputs.needs_claude }}
        run: bash .patch-stack-action/scripts/workflow/summary.sh

      # ── Cleanup ─────────────────────────────────────────────────────────
      # Revoke the App installation token so it can't be reused if leaked.
      # Runs even on failure — mirrors claude-code-action's cleanup pattern.
      - name: Revoke App token
        if: always()
        shell: bash
        env:
          FORK_APP_TOKEN: ${{ steps.fork-token.outputs.token }}
          UPSTREAM_APP_TOKEN: ${{ steps.upstream-token.outputs.token }}
        run: |
          for token in "${FORK_APP_TOKEN}" "${UPSTREAM_APP_TOKEN}"; do
            [[ -z "${token}" ]] && continue
            curl --silent --fail-with-body \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${token}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL:-https://api.github.com}/installation/token" \
              || true
          done
